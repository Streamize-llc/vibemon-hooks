name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest

      - name: Build dist artifacts
        run: python3 scripts/build.py

      - name: Verify dist artifacts are committed and reproducible
        run: python3 scripts/build.py --check

      - name: Run all tests
        run: python3 -m pytest tests/ -v

      - name: bash -n on dist/install.sh
        run: bash -n dist/install.sh

      - name: Dry-install into a temp HOME
        env:
          HOME: ${{ runner.temp }}/test-home
        run: |
          mkdir -p "$HOME"
          # Inject a dummy Supabase URL — connection probe will hang against
          # this fake host. We use `perl -e 'alarm N; exec @ARGV'` because it
          # works on both macOS (no `timeout`) and Linux.
          sed "s|__SUPABASE_URL__|https://dummy.supabase.co|g" dist/install.sh > /tmp/probe.sh
          (
            perl -e 'alarm 8; exec @ARGV' bash /tmp/probe.sh dummy_api_key || true
          ) > /tmp/install.log 2>&1
          echo "=== install log ==="
          cat /tmp/install.log
          echo "=== installed files ==="
          ls -la "$HOME/.vibemon/" || true
          test -f "$HOME/.vibemon/notify.sh" || (echo "notify.sh not installed" && exit 1)
          test -f "$HOME/.vibemon/api-key" || (echo "api-key not saved" && exit 1)
          bash -n "$HOME/.vibemon/notify.sh"
          echo "✓ notify.sh syntax valid after real install"

      - name: Privacy canary summary
        run: |
          python3 -m pytest tests/test_privacy_canary.py -v 2>&1 | tee /tmp/canary.log
          echo "===================="
          echo "Privacy invariants: PASSED"
          echo "===================="

  test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest

      - name: Build dist artifacts
        run: python scripts\build.py

      - name: Verify dist artifacts are committed and reproducible
        run: python scripts\build.py --check

      - name: Run all tests
        run: python -m pytest tests/ -v

      - name: PowerShell AST parse on dist/install.ps1
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path "dist\install.ps1"),
              [ref]$tokens,
              [ref]$errors
          )
          if ($errors -and $errors.Count -gt 0) {
              foreach ($e in $errors) { Write-Error $e }
              exit 1
          }
          Write-Host "ok dist\install.ps1 AST parses"

      - name: Dry-install into a temp USERPROFILE
        shell: pwsh
        env:
          USERPROFILE: ${{ runner.temp }}\test-home
        run: |
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE | Out-Null
          # The connection probe will fail (HTTP 401 against the real
          # Supabase URL with a dummy key, or hang briefly) — we tolerate
          # a non-zero exit and verify the file layout instead.
          try {
              & .\dist\install.ps1 -ApiKey dummy_api_key 2>&1 | Tee-Object -FilePath install.log
          } catch {}
          Write-Host "=== install log ==="
          Get-Content install.log -ErrorAction SilentlyContinue
          Write-Host "=== installed files ==="
          Get-ChildItem (Join-Path $env:USERPROFILE ".vibemon") -ErrorAction SilentlyContinue
          if (-not (Test-Path (Join-Path $env:USERPROFILE ".vibemon\notify.py"))) {
              throw "notify.py not installed"
          }
          if (-not (Test-Path (Join-Path $env:USERPROFILE ".vibemon\api-key"))) {
              throw "api-key not saved"
          }
          python -c "import py_compile; py_compile.compile(r'$env:USERPROFILE\.vibemon\notify.py', doraise=True)"
          Write-Host "ok notify.py installed and compiles"

      - name: Privacy canary summary
        run: python -m pytest tests/test_privacy_canary.py -v
